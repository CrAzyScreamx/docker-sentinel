name: Release Binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e .[dev]
      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller \
            --name docker-sentinel \
            --collect-all litellm \
            --collect-all tiktoken \
            --collect-all tiktoken_ext \
            --collect-all google.adk \
            --collect-all google.genai \
            --collect-all anthropic \
            --collect-all openai \
            --collect-all pydantic \
            --collect-all docker \
            --collect-all certifi \
            \
            --exclude-module litellm.proxy \
            --exclude-module litellm.integrations \
            --exclude-module litellm.router \
            --exclude-module litellm.batches \
            --exclude-module litellm.fine_tuning \
            --exclude-module google.adk.cli \
            --exclude-module google.adk.web \
            --exclude-module google.adk.a2a \
            --exclude-module google.genai.tests \
            --exclude-module openai.cli \
            --exclude-module openai.helpers \
            \
            --exclude-module boto3 \
            --exclude-module botocore \
            --exclude-module s3transfer \
            --exclude-module aiobotocore \
            --exclude-module azure \
            --exclude-module google.cloud \
            --exclude-module cohere \
            --exclude-module replicate \
            --exclude-module huggingface_hub \
            \
            --exclude-module torch \
            --exclude-module tensorflow \
            --exclude-module transformers \
            --exclude-module jax \
            --exclude-module pandas \
            --exclude-module numpy \
            --exclude-module scipy \
            --exclude-module matplotlib \
            --exclude-module sklearn \
            --exclude-module PIL \
            \
            --exclude-module fastapi \
            --exclude-module uvicorn \
            --exclude-module starlette \
            --exclude-module flask \
            --exclude-module django \
            --exclude-module aiohttp \
            \
            --exclude-module opentelemetry \
            --exclude-module prometheus_client \
            --exclude-module sqlalchemy \
            --exclude-module redis \
            --exclude-module celery \
            --exclude-module langchain \
            docker_sentinel/cli.py
      - name: Archive directory
        run: tar -czf docker-sentinel-linux-amd64.tar.gz -C dist docker-sentinel
      - uses: actions/upload-artifact@v4
        with:
          name: docker-sentinel-linux-amd64
          path: docker-sentinel-linux-amd64.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows binary
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e .[dev]
      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller `
            --name docker-sentinel `
            --collect-all litellm `
            --collect-all tiktoken `
            --collect-all tiktoken_ext `
            --collect-all google.adk `
            --collect-all google.genai `
            --collect-all anthropic `
            --collect-all openai `
            --collect-all pydantic `
            --collect-all docker `
            --collect-all certifi `
            `
            --exclude-module litellm.proxy `
            --exclude-module litellm.integrations `
            --exclude-module litellm.router `
            --exclude-module litellm.batches `
            --exclude-module litellm.fine_tuning `
            --exclude-module google.adk.cli `
            --exclude-module google.adk.web `
            --exclude-module google.adk.a2a `
            --exclude-module google.genai.tests `
            --exclude-module openai.cli `
            --exclude-module openai.helpers `
            `
            --exclude-module boto3 `
            --exclude-module botocore `
            --exclude-module s3transfer `
            --exclude-module aiobotocore `
            --exclude-module azure `
            --exclude-module google.cloud `
            --exclude-module cohere `
            --exclude-module replicate `
            --exclude-module huggingface_hub `
            `
            --exclude-module torch `
            --exclude-module tensorflow `
            --exclude-module transformers `
            --exclude-module jax `
            --exclude-module pandas `
            --exclude-module numpy `
            --exclude-module scipy `
            --exclude-module matplotlib `
            --exclude-module sklearn `
            --exclude-module PIL `
            `
            --exclude-module fastapi `
            --exclude-module uvicorn `
            --exclude-module starlette `
            --exclude-module flask `
            --exclude-module django `
            --exclude-module aiohttp `
            `
            --exclude-module opentelemetry `
            --exclude-module prometheus_client `
            --exclude-module sqlalchemy `
            --exclude-module redis `
            --exclude-module celery `
            --exclude-module langchain `
            docker_sentinel/cli.py
        shell: pwsh
      - name: Archive directory
        run: Compress-Archive -Path dist\docker-sentinel -DestinationPath docker-sentinel-windows-amd64.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: docker-sentinel-windows-amd64
          path: docker-sentinel-windows-amd64.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-linux, build-windows]
    steps:
      - uses: actions/download-artifact@v4
        with: { name: docker-sentinel-linux-amd64, path: release-assets/ }
      - uses: actions/download-artifact@v4
        with: { name: docker-sentinel-windows-amd64, path: release-assets/ }
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/docker-sentinel-linux-amd64.tar.gz
            release-assets/docker-sentinel-windows-amd64.zip
          generate_release_notes: true
