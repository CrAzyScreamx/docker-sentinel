name: Release Binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e .[dev]
      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller \
            --name docker-sentinel \
            --collect-all litellm \
            --collect-all tiktoken \
            --collect-all tiktoken_ext \
            --collect-all google.adk \
            --collect-all google.genai \
            --collect-all anthropic \
            --collect-all openai \
            --collect-all pydantic \
            --collect-all docker \
            --collect-all certifi \
            --collect-all aiohttp \
            --collect-all fastapi \
            --collect-all starlette \
            --collect-all uvicorn \
            --collect-all opentelemetry \
            --collect-all mcp \
            --collect-all pywin32 \
            --collect-all docker_sentinel \
            --hidden-import google.adk.tools \
            --hidden-import google.adk.tools.function_tool \
            --hidden-import google.adk.tools.base_tool \
            --hidden-import google.adk.models.lite_llm \
            --hidden-import google.adk.flows \
            --hidden-import google.adk.events \
            --hidden-import google.genai.types \
            --copy-metadata docker-sentinel \
            --copy-metadata google-adk \
            --copy-metadata google-genai \
            --copy-metadata pydantic \
            docker_sentinel/cli.py
      - name: Archive directory
        run: tar -czf docker-sentinel-linux-amd64.tar.gz -C dist docker-sentinel
      - uses: actions/upload-artifact@v4
        with:
          name: docker-sentinel-linux-amd64
          path: docker-sentinel-linux-amd64.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows binary
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e .[dev]
      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller `
            --additional-hooks-dir hooks `
            --name docker-sentinel `
            --collect-all litellm `
            --collect-all tiktoken `
            --collect-all tiktoken_ext `
            --collect-all google.adk `
            --collect-all google.genai `
            --collect-all anthropic `
            --collect-all openai `
            --collect-all pydantic `
            --collect-all docker `
            --collect-all certifi `
            --collect-all aiohttp `
            --collect-all fastapi `
            --collect-all starlette `
            --collect-all uvicorn `
            --collect-all opentelemetry `
            --collect-all mcp `
            --collect-all pywin32 `
            --collect-all docker_sentinel `
            --hidden-import win32api `
            --hidden-import pywintypes `
            --hidden-import win32con `
            --hidden-import win32file `
            --hidden-import win32pipe `
            --hidden-import win32event `
            --hidden-import win32security `
            --hidden-import ntsecuritycon `
            --hidden-import google.adk.tools `
            --hidden-import google.adk.tools.function_tool `
            --hidden-import google.adk.tools.base_tool `
            --hidden-import google.adk.models.lite_llm `
            --hidden-import google.adk.flows `
            --hidden-import google.adk.events `
            --hidden-import google.genai.types `
            --copy-metadata docker-sentinel `
            --copy-metadata google-adk `
            --copy-metadata google-genai `
            --copy-metadata pydantic `
            --clean `
            -y `
            docker_sentinel/cli.py
        shell: pwsh
      - name: Archive directory
        run: Compress-Archive -Path dist\docker-sentinel -DestinationPath docker-sentinel-windows-amd64.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: docker-sentinel-windows-amd64
          path: docker-sentinel-windows-amd64.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-linux, build-windows]
    steps:
      - uses: actions/download-artifact@v4
        with: { name: docker-sentinel-linux-amd64, path: release-assets/ }
      - uses: actions/download-artifact@v4
        with: { name: docker-sentinel-windows-amd64, path: release-assets/ }
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/docker-sentinel-linux-amd64.tar.gz
            release-assets/docker-sentinel-windows-amd64.zip
          generate_release_notes: true
